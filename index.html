function esc(s) { 
  if (!s) return ""; 
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); 
}

function getData() { return state.tab === "college" ? state.college : state.hs; }
function getLocLabel() { return state.tab === "college" ? "School" : "Area"; }
function getUnique(field) { return [...new Set(getData().map(d=>d[field]).filter(Boolean))].sort(); }

function getEvaluators() {
  const data = getData();
  const names = new Set();
  data.forEach(p => {
    if (p.tierVotes) Object.keys(p.tierVotes).forEach(n => names.add(n));
  });
  return [...names].sort();
}

function getDisplayTier(p) {
  const evalFilter = state.filters.evaluator;
  const votes = p.tierVotes || {};
  const voteEntries = Object.entries(votes);
  if (evalFilter.length === 1) {
    const agentTier = votes[evalFilter[0]];
    if (agentTier) return agentTier;
    return p.tier;
  }
  if (voteEntries.length > 0) {
    const sum = voteEntries.reduce((s, [_, t]) => s + parseFloat(t), 0);
    return String(Math.round(sum / voteEntries.length));
  }
  return p.tier;
}

function applyFilters(data) {
  let d = [...data];
  if (state.search) {
    const s = state.search.toLowerCase();
    d = d.filter(p => (p.lastName+p.firstName+p.position+p.location+p.agency+(p.evaluations||[]).map(e=>e.notes).join(" ")).toLowerCase().includes(s));
  }
  const f = state.filters;
  if (f.tier.length) d = d.filter(p => f.tier.includes(getDisplayTier(p)));
  if (f.class.length) d = d.filter(p => f.class.includes(p["class"]));
  if (f.agency.length) d = d.filter(p => f.agency.includes(p.agency));
  if (f.position.length) d = d.filter(p => f.position.includes(p.position));
  if (f.location.length) d = d.filter(p => f.location.includes(p.location));
  if (f.evaluator.length === 1) d = d.filter(p => p.tierVotes && p.tierVotes[f.evaluator[0]]);
  // sort
  d.sort((a,b) => {
    let av, bv;
    if (state.sortKey === "tier") {
      av = parseFloat(getDisplayTier(a)) || 999;
      bv = parseFloat(getDisplayTier(b)) || 999;
    } else if (["age","class"].includes(state.sortKey)) {
      av = parseFloat(a[state.sortKey]) || 999;
      bv = parseFloat(b[state.sortKey]) || 999;
    } else {
      av = (a[state.sortKey]||"").toLowerCase();
      bv = (b[state.sortKey]||"").toLowerCase();
    }
    if (av<bv) return state.sortDir==="asc"?-1:1;
    if (av>bv) return state.sortDir==="asc"?1:-1;
    return 0;
  });
  return d;
}

function showToast(msg) {
  state.toast = msg; render();
  setTimeout(() => { state.toast = null; render(); }, 2500);
}

async function loadData() {
  state.loading = true; state.error = null; render();
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    state.college = data.college || [];
    state.hs = data.hs || [];
    state.recruiting = data.recruiting || [];
  } catch(e) {
    state.error = e.message || "Failed to connect to Google Sheets";
  }
  state.loading = false; render();
}

async function postAPI(payload) {
  const res = await fetch(API_URL, { method:"POST", headers:{"Content-Type":"text/plain"}, body:JSON.stringify(payload) });
  return await res.json();
}

async function updateField(player, field, value) {
  const list = state.tab === "college" ? state.college : state.hs;
  const p = list.find(x => x.id === player.id);
  if (p) p[field] = value;
  render();
  try { await postAPI({action:"updateField",tab:state.tab,row:player._row,field,value}); }
  catch(e) { console.error(e); }
}

function getEvaluatorName() {
  if (state.currentEvaluator) return state.currentEvaluator;
  const name = prompt("Enter your name (for tier voting):");
  if (!name || !name.trim()) return null;
  state.currentEvaluator = name.trim();
  return state.currentEvaluator;
}

async function submitTierVote(player, tier) {
  const evaluator = getEvaluatorName();
  if (!evaluator) return;
  const list = state.tab === "college" ? state.college : state.hs;
  const p = list.find(x => x.id === player.id);
  if (!p) return;
  if (!p.tierVotes) p.tierVotes = {};
  p.tierVotes[evaluator] = tier;
  render();
  const tabLabel = state.tab === "college" ? "College" : "HS";
  try {
    await postAPI({action:"addTierVote", tab:tabLabel, lastName:p.lastName, firstName:p.firstName, evaluator, tier});
  } catch(e) { console.error(e); }
  const displayTier = getDisplayTier(p);
  const voteCount = Object.keys(p.tierVotes).length;
  showToast(p.firstName + " " + p.lastName + " — Your vote: Tier " + tier + " · Consensus: Tier " + displayTier + " (" + voteCount + " vote" + (voteCount!==1?"s":"") + ")");
}

async function addEval(player, evaluator, notes) {
  const dateStr = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  try {
    await postAPI({action:"addEval",tab:state.tab==="college"?"College":"HS",lastName:player.lastName,firstName:player.firstName,evaluator,notes});
    // Update local
    const list = state.tab === "college" ? state.college : state.hs;
    const p = list.find(x => x.id === player.id);
    if (p) {
      if (!p.evaluations) p.evaluations = [];
      p.evaluations.unshift({evaluator,date:dateStr,notes});
    }
    state.selectedPlayer = p;
    state.showEvalForm = false;
    showToast("Evaluation saved");
  } catch(e) { alert("Failed: " + e.message); }
}

async function addPlayer(playerData) {
  try {
    await postAPI({action:"addPlayer",tab:state.tab,player:playerData});
    state.showAddForm = false;
    showToast("Added: " + playerData.firstName + " " + playerData.lastName);
    await loadData();
  } catch(e) { alert("Failed: " + e.message); }
}

function toggleFilter(field, value) {
  const arr = state.filters[field];
  if (field === "evaluator") {
    if (arr.includes(value)) { state.filters[field] = []; }
    else { state.filters[field] = [value]; }
  } else {
    const idx = arr.indexOf(value);
    if (idx >= 0) arr.splice(idx,1); else arr.push(value);
  }
  state.page = 0;
  render();
}

function clearFilters() {
  state.filters = {tier:[],class:[],agency:[],position:[],location:[],evaluator:[]};
  state.page = 0;
  render();
}

function setSort(key) {
  if (state.sortKey === key) state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
  else { state.sortKey = key; state.sortDir = "asc"; }
  state.page = 0;
  render();
}

function activeFilterCount() {
  return Object.values(state.filters).reduce((s,a) => s+a.length, 0);
}

  h += `</div>`; // content

    evals.forEach((ev,i) => {
      h += `<div style="padding:14px;border-radius:10px;margin-bottom:8px;background:${i===0?"rgba(59,130,246,0.06)":"transparent"};border:${i===0?"1px solid #1e3a5f":"1px solid #1f2937"}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:13px;font-weight:600;color:${i===0?"#93c5fd":"#d1d5db"}">${esc(ev.evaluator)}</span>

  if (state.editPlayer) {

    const displayTier = getDisplayTier(p);
    const myVote = (p.tierVotes && state.currentEvaluator) ? p.tierVotes[state.currentEvaluator] : null;
    const iStyle = "width:100%;padding:8px 12px;border-radius:8px;border:1px solid #374151;background:#0d1117;color:#f9fafb;font-size:13px;font-family:inherit;outline:none";
    const lStyle = "font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,0.35);display:block;margin-bottom:4px";
    h += `<div onclick="state.editPlayer=null;render()" style="position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)">
      <div onclick="event.stopPropagation()" style="background:#111827;border-radius:16px;padding:28px;max-width:520px;width:100%;border:1px solid #1f2937;box-shadow:0 25px 60px rgba(0,0,0,0.5);max-height:90vh;overflow-y:auto">
        <div style="display:flex;justify-content:space-between;margin-bottom:20px">
          <h2 style="font-size:20px;font-weight:700;color:#f9fafb">Edit Player</h2>
          <button onclick="state.editPlayer=null;render()" style="background:none;border:none;color:#6b7280;cursor:pointer;font-size:20px">✕</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div><label style="${lStyle}">First Name</label><input id="edit-fn" value="${esc(p.firstName)}" style="${iStyle}" /></div>
          <div><label style="${lStyle}">Last Name</label><input id="edit-ln" value="${esc(p.lastName)}" style="${iStyle}" /></div>
          <div><label style="${lStyle}">Position</label><input id="edit-pos" value="${esc(p.position)}" style="${iStyle}" /></div>
          <div><label style="${lStyle}">Class</label><input id="edit-class" value="${esc(p["class"])}" style="${iStyle}" /></div>
          <div><label style="${lStyle}">Age</label><input id="edit-age" value="${esc(p.age)}" style="${iStyle}" /></div>
          <div><label style="${lStyle}">B/T</label><input id="edit-hand" value="${esc(p.handedness)}" style="${iStyle}" /></div>
          <div><label style="${lStyle}">Agency</label><input id="edit-agency" value="${esc(p.agency)}" style="${iStyle}" /></div>
          <div><label style="${lStyle}">${locLabel}</label><input id="edit-loc" value="${esc(p.location)}" style="${iStyle}" /></div>
          <div style="grid-column:1/-1"><label style="${lStyle}">Video Links</label><input id="edit-video" value="${esc(p.video||"")}" placeholder="Separate multiple links with commas" style="${iStyle}" /></div>

          <div style="grid-column:1/-1"><button onclick="addToRecruiting('${esc(p.firstName)} ${esc(p.lastName)}','${esc(p.location)}','${esc(p.position)}','${esc(getDisplayTier(p))}','${esc(p["class"])}')" style="display:flex;align-items:center;gap:6px;width:100%;padding:10px 14px;border-radius:10px;border:1px dashed rgba(168,85,247,0.4);background:rgba(168,85,247,0.04);color:#c4b5fd;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;justify-content:center">🎯 Add to Recruiting List</button></div>

function checkPassword() {
  const inp = document.getElementById("pw-input");
  if (inp && inp.value.trim() === PASSWORD) {
    state.authed = true;
    loadData();
  } else {
    document.getElementById("pw-error").style.display = "block";
    if (inp) { inp.value = ""; inp.focus(); }
  }
}

function openPlayer(id) {
  const list = state.tab === "college" ? state.college : state.hs;
  state.selectedPlayer = list.find(p => p.id === id) || null;
  state.showEvalForm = false;
  render();
}

function submitEval() {
  const who = document.getElementById("eval-who")?.value?.trim();
  const notes = document.getElementById("eval-notes")?.value?.trim();
  if (!who || !notes || !state.selectedPlayer) return;
  addEval(state.selectedPlayer, who, notes);
}

function submitAddPlayer() {
  const fn = document.getElementById("add-fn")?.value?.trim();
  const ln = document.getElementById("add-ln")?.value?.trim();
  if (!fn || !ln) return;
  addPlayer({
    firstName: fn,
    lastName: ln,
    position: document.getElementById("add-pos")?.value?.trim()||"",
    "class": document.getElementById("add-class")?.value?.trim()||"",
    tier: document.getElementById("add-tier")?.value||"3",
    age: document.getElementById("add-age")?.value?.trim()||"",
    handedness: document.getElementById("add-hand")?.value?.trim()||"",
    agency: document.getElementById("add-agency")?.value?.trim()||"",
    location: document.getElementById("add-loc")?.value?.trim()||"",
    video: document.getElementById("add-video")?.value?.trim()||"",
    agentEval: document.getElementById("add-eval")?.value?.trim()||"",
    notes: document.getElementById("add-notes")?.value?.trim()||"",
  });
}

let searchTimer = null;
function debouncedSearch(value) {
  state.search = value;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { render(); refocusSearch(); }, 300);
}

function refocusSearch() {
  const inp = document.getElementById("search-input");
  if (inp) { inp.focus(); inp.selectionStart = inp.selectionEnd = inp.value.length; }
}

function openEdit(id) {
  const list = state.tab === "college" ? state.college : state.hs;
  state.editPlayer = list.find(p => p.id === id) || null;
  render();
}

function submitEdit() {
  const p = state.editPlayer;
  if (!p) return;
  const fields = {
    firstName: document.getElementById("edit-fn")?.value?.trim(),
    lastName: document.getElementById("edit-ln")?.value?.trim(),
    position: document.getElementById("edit-pos")?.value?.trim(),
    "class": document.getElementById("edit-class")?.value?.trim(),
    age: document.getElementById("edit-age")?.value?.trim(),
    handedness: document.getElementById("edit-hand")?.value?.trim(),
    agency: document.getElementById("edit-agency")?.value?.trim(),
    location: document.getElementById("edit-loc")?.value?.trim(),
    video: document.getElementById("edit-video")?.value?.trim(),
  };
  Object.entries(fields).forEach(([field, value]) => {
    if (value !== undefined && value !== p[field]) {
      updateField(p, field, value);
    }
  });
  // Handle tier vote from modal
  const tierVoteVal = document.getElementById("edit-tier-vote")?.value;
  if (tierVoteVal) {
    submitTierVote(p, tierVoteVal);
  }
  state.editPlayer = null;
  showToast("Updated: " + fields.firstName + " " + fields.lastName);
}

function toggleTier(id, evt) {
  // Remove any existing dropdown
  const existing = document.getElementById("tier-dropdown");
  const existingBg = document.getElementById("tier-dropdown-bg");
  if (existing) existing.remove();
  if (existingBg) existingBg.remove();

  // If clicking same one, just close
  if (state.tierDropdownId === id) { state.tierDropdownId = null; return; }
  state.tierDropdownId = id;

  const list = state.tab === "college" ? state.college : state.hs;
  const p = list.find(x => x.id === id);
  if (!p) return;

  // Create backdrop
  const bg = document.createElement("div");
  bg.id = "tier-dropdown-bg";
  bg.style.cssText = "position:fixed;inset:0;z-index:99;";
  bg.onclick = function() { bg.remove(); document.getElementById("tier-dropdown")?.remove(); state.tierDropdownId = null; };
  document.body.appendChild(bg);

  // Create dropdown
  const dd = document.createElement("div");
  dd.id = "tier-dropdown";
  dd.style.cssText = "position:fixed;z-index:100;background:#1f2937;border:1px solid #374151;border-radius:8px;padding:4px;box-shadow:0 8px 24px rgba(0,0,0,0.5);min-width:140px;left:" + evt.clientX + "px;top:" + (evt.clientY + 10) + "px;";

  // Header
  const header = document.createElement("div");
  header.style.cssText = "padding:4px 10px 6px;border-bottom:1px solid #374151;margin-bottom:2px;";
  header.innerHTML = '<span style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:1px">Your Tier Vote</span>';
  dd.appendChild(header);

  ["1","2","3","4"].forEach(function(t) {
    const c = TIER[t];
    const currentEvalTier = p.tierVotes && state.currentEvaluator ? p.tierVotes[state.currentEvaluator] : null;
    const btn = document.createElement("button");
    btn.style.cssText = "display:flex;align-items:center;gap:8px;width:100%;padding:5px 10px;background:" + (currentEvalTier===t?"rgba(59,130,246,0.15)":"none") + ";border:none;border-radius:4px;cursor:pointer;font-family:inherit;";
    btn.innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + c.badge + '"></span><span style="color:#d1d5db;font-size:13px">' + c.label + '</span>' + (currentEvalTier===t?' <span style="font-size:10px;color:#6b7280">✓</span>':'');
    btn.onclick = function(e) {
      e.stopPropagation();
      submitTierVote(p, t);
      bg.remove();
      dd.remove();
      state.tierDropdownId = null;
    };
    dd.appendChild(btn);
  });

  document.body.appendChild(dd);
}

function toggleRecruitFilter(field, value) {
  const arr = recruitState.rFilters[field];
  const idx = arr.indexOf(value);
  if (idx >= 0) arr.splice(idx,1); else arr.push(value);
  render();
}

function setRecruitSort(key) {
  if (recruitState.rSortKey === key) recruitState.rSortDir = recruitState.rSortDir === "asc" ? "desc" : "asc";
  else { recruitState.rSortKey = key; recruitState.rSortDir = "asc"; }
  render();
}

function openRecruitEdit(id) {
  const r = state.recruiting.find(x => x.id === id);
  if (r) { recruitState.editRecruit = {...r}; render(); }
}

async function submitAddRecruit() {
  const player = document.getElementById("ar-player")?.value?.trim();
  if (!player) return;
  const recruit = {
    player,
    school: document.getElementById("ar-school")?.value?.trim() || "",
    position: document.getElementById("ar-pos")?.value?.trim() || "",
    tier: document.getElementById("ar-tier")?.value || "2",
    agents: document.getElementById("ar-agents")?.value?.trim() || "",
    status: document.getElementById("ar-status")?.value || "Active",
    classYear: document.getElementById("ar-class")?.value?.trim() || "",
  };
  try {
    await postAPI({action:"addRecruit", recruit});
    recruitState.showAddRecruit = false;
    showToast("Added recruit: " + player);
    await loadData();
  } catch(e) { alert("Failed: " + e.message); }
}

async function submitRecruitEdit() {
  const er = recruitState.editRecruit;
  if (!er) return;
  const fields = {
    player: document.getElementById("er-player")?.value?.trim() || er.player,
    school: document.getElementById("er-school")?.value?.trim() || "",
    position: document.getElementById("er-pos")?.value?.trim() || "",
    tier: document.getElementById("er-tier")?.value || er.tier,
    agents: document.getElementById("er-agents")?.value?.trim() || "",
    status: document.getElementById("er-status")?.value || er.status,
    classYear: document.getElementById("er-class")?.value?.trim() || "",
  };
  // Update local state immediately
  const r = state.recruiting.find(x => x.id === er.id);
  if (r) Object.assign(r, fields);
  recruitState.editRecruit = null;
  showToast("Updated: " + fields.player);
  render();
  try {
    await postAPI({action:"updateRecruit", row: er._row, fields});
  } catch(e) { console.error(e); }
}

async function addToRecruiting(playerName, school, position, tier, classYear) {
  const evaluator = getEvaluatorName();
  if (!evaluator) return;
  const recruit = {
    player: playerName,
    school: school || "",
    position: position || "",
    tier: tier || "2",
    agents: evaluator,
    status: "Active",
    classYear: classYear || "",
  };
  // Close any open modals
  state.selectedPlayer = null;
  state.editPlayer = null;
  state.showEvalForm = false;
  try {
    await postAPI({action:"addRecruit", recruit});
    showToast("🎯 Added " + playerName + " to Recruiting");
    await loadData();
  } catch(e) { alert("Failed: " + e.message); }
}

// Init
render();
</script>
</body>
</html>
